<div class="centered-container">
    <div class="auth-card">
        <h2>Enter OTP</h2>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 1.5rem;">
            Please enter the verification code sent to your device.
        </p>

        <form (ngSubmit)="verify()">
            <input type="text" placeholder="Enter OTP Code" [(ngModel)]="otpCode" name="otp" required
                style="text-align: center; letter-spacing: 0.5rem; font-size: 1.25rem;" />

            <button type="submit">Verify</button>
        </form>

        <div style="text-align: center; margin-top: 1rem;">
            <p class="success-msg" *ngIf="successMessage"
                style="color: #10B981; text-align: center; margin-bottom: 1rem;">{{ successMessage }}</p>
            <p class="info-msg" *ngIf="!successMessage"
                style="text-align: center; margin-bottom: 1.5rem; color: var(--text-muted);">
                We've sent a 6-digit code to {{email}}
            </p>
            <p style="font-size: 0.875rem; color: var(--text-muted);">
                Didn't receive the code?
                <a href="javascript:void(0)" (click)="resend()"
                    style="color: var(--primary); font-weight: 600; text-decoration: none;">
                    Resend
                </a>
            </p>
        </div>

        <p class="error-msg" *ngIf="error">{{ error }}</p>
    </div>
</div>
