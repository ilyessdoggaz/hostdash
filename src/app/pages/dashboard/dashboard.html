<div class="dashboard-layout">
  <nav class="sidebar">
    <div class="logo">Hostdash</div>
    <ul>
      <li (click)="router.navigate(['/dashboard'])">Dashboard</li>
      <li (click)="router.navigate(['/my-cars'])">My Cars</li>
      <li>Bookings</li>
      <li>Earnings</li>
      <li class="logout" (click)="logout()">Logout</li>
    </ul>
  </nav>

  <main class="content">
    <header>
      <div class="header-main">
        <h1>Welcome back, <span style="color: var(--primary);">{{hostProfile?.agencyName || currentUser?.firstName ||
            'Host'}}</span></h1>
        <button class="add-car-btn" (click)="router.navigate(['/add-car'])">
          <span class="material-icons">add</span>
          Add New Car
        </button>
      </div>
      <button class="profile-entry" (click)="router.navigate(['/profile'])">
        <img *ngIf="hostProfile?.agencyLogo" [src]="hostProfile.agencyLogo" alt="Profile" class="header-logo">
        <span *ngIf="!hostProfile?.agencyLogo" class="material-icons">account_circle</span>
      </button>
    </header>

    <div class="stats-grid">
      <div class="stat-card">
        <h3>Total Earnings</h3>
        <p class="value">0.000 DT</p>
      </div>
      <div class="stat-card">
        <h3>Active Rentals</h3>
        <p class="value">0</p>
      </div>
      <div class="stat-card">
        <h3>Available Cars</h3>
        <p class="value">{{availableCount}}</p>
      </div>
    </div>

    <div class="dashboard-map-section">
      <div class="map-header">
        <h3> Live Car Tracker - Tunisia</h3>
        <div class="map-legend">
          <span class="legend-item"><span class="dot active"></span> Active</span>
          <span class="legend-item"><span class="dot available"></span> Available</span>
          <span class="legend-item"><span class="dot rented"></span> Rented</span>
        </div>
      </div>
      <div id="google-map" class="google-map-container"></div>
    </div>
  </main>
</div>
