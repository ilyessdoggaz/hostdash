<div class="dashboard-layout">
    <nav class="sidebar">
        <div class="logo">Hostdash</div>
        <ul>
            <li class="active">Dashboard</li>
            <li>My Cars</li>
            <li>Bookings</li>
            <li>Earnings</li>
            <li class="logout" (click)="logout()">Logout</li>
        </ul>
    </nav>

    <main class="content">
        <header>
            <h1>Dashboard</h1>
            <div class="user-profile">Host User</div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Earnings</h3>
                <p class="value">$0.00</p>
            </div>
            <div class="stat-card">
                <h3>Active Rentals</h3>
                <p class="value">0</p>
            </div>
            <!-- Pending requests removed - booking is instant -->
        </div>

        <div class="dashboard-map-section">
            <h3>Live Car Tracker</h3>
            <div class="map-placeholder">
                <div class="map-bg"></div>
                <div class="map-marker" style="top: 40%; left: 30%;" title="Car 1: Active"></div>
                <div class="map-marker" style="top: 60%; left: 70%;" title="Car 2: Available"></div>
                <div class="map-message">Interactive Map Component</div>
            </div>
        </div>

        <div class="dashboard-card">
            <h3>Recent Activity</h3>
            <p>Your recent car listings and booking activity will appear here.</p>
        </div>
    </main>
</div>
