<div class="centered-container">
    <div class="auth-card">
        <h2>Reset Password</h2>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 1.5rem;">
            Enter your email address and we'll send you a link to reset your password.
        </p>

        <form (ngSubmit)="submit()" #resetForm="ngForm" *ngIf="!message">
            <div>
                <input type="email" placeholder="Email" [(ngModel)]="email" name="email" required email
                    #emailInput="ngModel"
                    [style.border-color]="emailInput.invalid && (emailInput.dirty || emailInput.touched) ? '#EF4444' : ''" />
                <div *ngIf="emailInput.invalid && (emailInput.dirty || emailInput.touched)"
                    style="color: #EF4444; font-size: 0.875rem; margin-top: -0.5rem; margin-bottom: 1rem;">
                    <small *ngIf="emailInput.errors?.['required']">Email is required.</small>
                    <small *ngIf="emailInput.errors?.['email']">Please enter a valid email address.</small>
                </div>
            </div>

            <button type="submit" [disabled]="!resetForm.form.valid">Send Reset Link</button>
        </form>

        <div *ngIf="message" style="text-align: center; color: var(--secondary); margin-bottom: 1rem;">
            <p>✅ {{ message }}</p>
        </div>

        <p class="error-msg" *ngIf="error">{{ error }}</p>

        <p style="text-align: center; margin-top: 1rem;">
            <a routerLink="/login" style="color: var(--primary); text-decoration: none;">Back to Login</a>
        </p>
    </div>
</div>
