<div class="profile-container">
    <div class="header-section">
        <button class="back-btn" (click)="goBack()">
            <span class="material-icons">arrow_back</span>
            Back to Dashboard
        </button>
        <h1>Host Profile</h1>
        <p>Manage your account settings and agency details.</p>
    </div>

    <div class="profile-grid">
        <!-- Main Info -->
        <div class="profile-card">
            <h3>Personal Information</h3>
            <div class="input-row">
                <div class="input-group">
                    <label>First Name</label>
                    <input type="text" [(ngModel)]="user.firstName">
                </div>
                <div class="input-group">
                    <label>Last Name</label>
                    <input type="text" [(ngModel)]="user.lastName">
                </div>
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" [(ngModel)]="user.email" disabled>
                <small>Email cannot be changed for security reasons.</small>
            </div>

            <h3 style="margin-top: 40px;">Agency Details</h3>
            <div class="input-group">
                <label>Agency Name</label>
                <input type="text" [(ngModel)]="user.agencyName">
            </div>
            <div class="input-group">
                <label>About your Agency</label>
                <textarea [(ngModel)]="user.agencyDetails" rows="4"
                    placeholder="Add some details about you or your mission..."></textarea>
            </div>

            <div class="save-footer">
                <button class="save-btn" (click)="saveProfile()">Save Changes</button>
            </div>
        </div>

        <!-- logo & Actions -->
        <div class="sidebar-info">
            <div class="profile-card logo-card">
                <h3>Agency Logo</h3>
                <div class="logo-preview" (click)="logoInput.click()">
                    <img *ngIf="user.agencyLogo" [src]="user.agencyLogo" alt="Agency Logo">
                    <div *ngIf="!user.agencyLogo" class="placeholder">
                        <span class="material-icons">add_a_photo</span>
                        <p>Upload Logo</p>
                    </div>
                    <input #logoInput type="file" (change)="onLogoUpload($event)" style="display: none"
                        accept="image/*">
                </div>
                <p class="logo-note">Click to change your agency logo.</p>
            </div>

            <div class="profile-card danger-zone">
                <h3>Account Actions</h3>
                <button class="action-btn logout-btn" (click)="logout()">
                    <span class="material-icons">logout</span>
                    Logout
                </button>
                <button class="action-btn delete-btn" (click)="deleteAccount()">
                    <span class="material-icons">delete_forever</span>
                    Delete Account
                </button>
            </div>
        </div>
    </div>
</div>
